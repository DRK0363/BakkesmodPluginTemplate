name: Build Plugin
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Setup BakkesMod SDK
        run: |
          git clone https://github.com/bakkesmodorg/BakkesMod2-Plugins.git sdk
          move sdk\bakkesmod $github_workspace\

      - name: Build Plugin
        run: msbuild BakkesPluginTemplate.vcxproj /p:Configuration=Release /p:Platform=x64

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SteamPFPs-Plugin
          path: |
             x64/Release/*.dll
             Release/*.dll
