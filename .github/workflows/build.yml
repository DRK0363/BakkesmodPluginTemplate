name: Build Plugin
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Setup BakkesMod SDK
        run: |
          git clone --depth 1 https://github.com/bakkesmodorg/BakkesMod2-Plugins.git temp_sdk
          # Klasör yapısına bakmadan bakkesmod klasörünü bul ve ana dizine kopyala
          powershell -Command "Get-ChildItem -Path 'temp_sdk' -Filter 'bakkesmod' -Recurse | Select-Object -First 1 | ForEach-Object { Copy-Item -Path $_.FullName -Destination '.' -Recurse -Force }"
          # Include klasörünü de garantiye alalım
          powershell -Command "if (Test-Path 'bakkesmod\include') { Copy-Item -Path 'bakkesmod\include\*' -Destination 'bakkesmod' -Recurse -Force }"

      - name: Build Plugin
        run: msbuild BakkesPluginTemplate.vcxproj /p:Configuration=Release /p:Platform=x64

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SteamPFPs-Plugin
          path: |
             x64/Release/*.dll
             Release/*.dll
             **/Release/*.dll
